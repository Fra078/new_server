services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONF_PATH}/qbittorrent:/config
      - ${DATA_PATH}:/data
    ports:
      - 8080:8080
    networks:
      - home_net
    #labels:
    #  caddy: ${DOMAIN}
    #  caddy.handle_path: /qbit*
    #  caddy.handle_path.reverse_proxy: "{{upstreams 8080}}"
    restart: unless-stopped
networks:
  home_net:
    external: true
