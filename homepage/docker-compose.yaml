services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    user: "1000:985"
    ports:
      - 3000:3000
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - HOMEPAGE_VAR_DOMAIN=${DOMAIN}
      - HOMEPAGE_ALLOWED_HOSTS=${DOMAIN},${TS_IP}:3000,${LOCAL_IP}:3000
    volumes:
      - ${CONF_PATH}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CLOUD_PATH}:/mnt/cloud
    networks:
      - home_net
    group_add:
      - "985"  
    restart: unless-stopped
networks:
  home_net:
    external: true
