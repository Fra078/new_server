services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONF_PATH}/jellyfin:/config
      - ${DATA_PATH}/media:/data/media
    networks:
      - home_net
    ports:
      - 8096:8096
    restart: unless-stopped
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONF_PATH}/navidrome:/data
      - ${DATA_PATH}/media/music:/music:ro
    networks:
      - media_net
    ports:
      - 4533:4533
    restart: unless-stopped
networks:
  home_net:
    name: home_net
    external: true    
