services:
  uptime_kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime_kuma
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONF_PATH}/uptime_kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3001:3001"
    networks:
      - home_net
    restart: unless-stopped
  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      # Read-only access to host system for hardware metrics
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${CONF_PATH}/netdata/lib:/var/lib/netdata
      - ${CONF_PATH}/netdata/cache:/var/cache/netdata
    restart: unless-stopped
networks:
  home_net:
    external: true
