services:
  uptime_kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime_kuma
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONF_PATH}/uptime_kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3001:3001"
    networks:
      - home_net
    restart: unless-stopped
  glances_monitor:
    image: nicolargo/glances:latest-full
    container_name: server_metrics
    pid: host
    network_mode: host
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    restart: unless-stopped
networks:
  home_net:
    external: true
