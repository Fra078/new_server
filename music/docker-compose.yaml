services:
  spotiflac:
    image: ghcr.io/fra078/spotiflac-docker-arm64:main
    container_name: spotiflac
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONF_PATH}/spotiflac:/config
      - ${DATA_PATH}/media/music/spotiflac:/downloads
    ports:
      - 3002:5800
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
