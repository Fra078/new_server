services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
    ports:
      - 8345:80
    volumes:
      - ${DATA_PATH}:/srv
      - ${CONF_PATH}/filebrowser/filebrowser.db:/filebrowser.db
      - ${CONF_PATH}/filebrowser/settings.json:/config/settings.json
    networks:
      - home_net
    restart: unless-stopped
  webdav:
    image: hacdias/webdav
    restart: always
    networks:
      - home_net
    ports:
      - "8660:8080"
    volumes:
      - ${DATA_PATH}:/data
      - ${CONF_PATH}/webdav/config.yml:/config.yml
networks:
  home_net:
    external: true
